# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      - pip install uv
    post_install:
      - uv sync --group docs --frozen
    build:
      html:
        - uv run --group docs sphinx-build -b html docs $READTHEDOCS_OUTPUT/html -W
