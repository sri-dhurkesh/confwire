<div class="sidebar-versions">
  <p><strong>Versions</strong></p>
  {%- if current_version %}
  <p>Current: {{ current_version.name }}</p>
  {%- endif %}
  <ul>
    {%- if versions %}
    {%- for item in versions.branches %}
    <li><a href="{{ pathto('../' + item.name + '/' + pagename + html_context.file_suffix, 1) }}">{{ item.name }}</a></li>
    {%- endfor %}
    {%- for item in versions.tags %}
    <li><a href="{{ pathto('../' + item.name + '/' + pagename + html_context.file_suffix, 1) }}">{{ item.name }}</a></li>
    {%- endfor %}
    {%- endif %}
  </ul>
</div>
